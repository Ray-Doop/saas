version: '3.8'

# ============================================================
# 智绘云 - 基础设施 Docker Compose
# 包含: Nacos, MySQL, Redis, MinIO, RocketMQ, SkyWalking
# ============================================================

networks:
  smart-cloud-net:
    driver: bridge
    name: smart-cloud-net

services:
  # ==================== MySQL 8.0 ====================
  mysql:
    image: mysql:8.0.33
    container_name: smart-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: smartcloud123
      MYSQL_DATABASE: smart_cloud
      MYSQL_USER: smartcloud
      MYSQL_PASSWORD: smartcloud123
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smart-cloud-net
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # ==================== Redis 7 ====================
  redis:
    image: redis:7.0-alpine
    container_name: smart-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - smart-cloud-net
    command: redis-server --appendonly yes --requirepass smartcloud123

  # ==================== Nacos 2.2 ====================
  nacos:
    image: nacos/nacos-server:v2.2.3
    container_name: smart-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      SPRING_DATASOURCE_PLATFORM: mysql
      MYSQL_SERVICE_HOST: mysql
      MYSQL_SERVICE_PORT: 3306
      MYSQL_SERVICE_DB_NAME: nacos_config
      MYSQL_SERVICE_USER: root
      MYSQL_SERVICE_PASSWORD: smartcloud123
      NACOS_AUTH_ENABLE: "true"
      NACOS_AUTH_TOKEN: SecretKey012345678901234567890123456789012345678901234567890123456789
      NACOS_AUTH_IDENTITY_KEY: nacos
      NACOS_AUTH_IDENTITY_VALUE: nacos
    ports:
      - "8848:8848"
      - "9848:9848"
    volumes:
      - ./data/nacos:/home/nacos/data
    networks:
      - smart-cloud-net
    depends_on:
      - mysql

  # ==================== MinIO ====================
  minio:
    image: minio/minio:RELEASE.2024-01-01T00-00-00Z
    container_name: smart-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./data/minio:/data
    networks:
      - smart-cloud-net
    command: server /data --console-address ":9001"

  # ==================== RocketMQ 5 ====================
  rocketmq-namesrv:
    image: apache/rocketmq:5.1.0
    container_name: smart-rmq-namesrv
    restart: unless-stopped
    ports:
      - "9876:9876"
    volumes:
      - ./data/rocketmq/namesrv:/home/rocketmq/logs
    networks:
      - smart-cloud-net
    command: sh mqnamesrv

  rocketmq-broker:
    image: apache/rocketmq:5.1.0
    container_name: smart-rmq-broker
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      NAMESRV_ADDR: rocketmq-namesrv:9876
    ports:
      - "10909:10909"
      - "10911:10911"
    volumes:
      - ./data/rocketmq/broker/logs:/home/rocketmq/logs
      - ./data/rocketmq/broker/store:/home/rocketmq/store
    networks:
      - smart-cloud-net
    command: sh mqbroker -n rocketmq-namesrv:9876

  rocketmq-dashboard:
    image: apacherocketmq/rocketmq-dashboard:latest
    container_name: smart-rmq-dashboard
    restart: unless-stopped
    depends_on:
      - rocketmq-namesrv
    environment:
      JAVA_OPTS: "-Drocketmq.namesrv.addr=rocketmq-namesrv:9876"
    ports:
      - "8180:8080"
    networks:
      - smart-cloud-net

  # ==================== SkyWalking OAP ====================
  skywalking-oap:
    image: apache/skywalking-oap-server:9.7.0
    container_name: smart-skywalking-oap
    restart: unless-stopped
    environment:
      SW_STORAGE: elasticsearch
      SW_STORAGE_ES_CLUSTER_NODES: elasticsearch:9200
      SW_HEALTH_CHECKER: default
    ports:
      - "11800:11800"
      - "12800:12800"
    networks:
      - smart-cloud-net

  skywalking-ui:
    image: apache/skywalking-ui:9.7.0
    container_name: smart-skywalking-ui
    restart: unless-stopped
    depends_on:
      - skywalking-oap
    environment:
      SW_OAP_ADDRESS: http://skywalking-oap:12800
    ports:
      - "8088:8080"
    networks:
      - smart-cloud-net

  # ==================== Elasticsearch (for SkyWalking) ====================
  elasticsearch:
    image: elasticsearch:7.17.15
    container_name: smart-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
      xpack.security.enabled: "false"
    ports:
      - "9200:9200"
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    networks:
      - smart-cloud-net
